<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Акції | Black Oromo Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .promotions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; margin: 3rem 0; }
        .promo-card { background: rgba(20,18,16,0.7); backdrop-filter: blur(8px); border-radius: 32px; overflow: hidden; transition: 0.3s; border: 1px solid rgba(212,175,55,0.2); }
        .promo-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .promo-card img { width: 100%; height: 200px; object-fit: cover; background: #2a241f; }
        .promo-card-content { padding: 1.5rem; }
        .promo-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--gold); }
        .promo-date { font-size: 0.8rem; opacity: 0.7; margin-bottom: 1rem; }
        .promo-desc { color: var(--text-muted); line-height: 1.5; }
        .empty-state { text-align: center; padding: 60px 20px; background: rgba(20,18,16,0.5); border-radius: 48px; }
    </style>
</head>
<body>
    <header>... (ваш header з навігацією) ...</header>
    <main>
        <div class="container" style="padding: 40px 0 60px;">
            <h2 class="section-title">Акції та події</h2>
            <div id="promotionsList" class="promotions-grid"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Завантаження...</div></div>
        </div>
    </main>
    <footer>... (ваш footer) ...</footer>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/chat-sidebar.js"></script>
    <script>
        async function loadPromotions() {
            try {
                const res = await fetch('/api/promotions');
                const promotions = await res.json();
                const container = document.getElementById('promotionsList');
                if (promotions.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-tags"></i><p>Наразі немає активних акцій. Слідкуйте за оновленнями!</p></div>';
                    return;
                }
                container.innerHTML = promotions.map(p => `
                    <div class="promo-card">
                        ${p.image_url ? `<img src="${p.image_url}" alt="${p.title}">` : '<div style="height:200px;background:#2a241f;display:flex;align-items:center;justify-content:center;"><i class="fas fa-tag" style="font-size:3rem;color:var(--gold);"></i></div>'}
                        <div class="promo-card-content">
                            <div class="promo-title">${escapeHtml(p.title)}</div>
                            <div class="promo-date">${p.start_date ? 'З ' + p.start_date : ''} ${p.end_date ? ' до ' + p.end_date : ''}</div>
                            <div class="promo-desc">${escapeHtml(p.description || '')}</div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { document.getElementById('promotionsList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Помилка завантаження</p></div>'; }
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':m==='>'?'&gt;':m); }
        loadPromotions();
        // ваш код checkUser() та інші скрипти
    </script>
</body>
</html>
