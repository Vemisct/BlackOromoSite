<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню | Black Oromo Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .menu-page {
            padding-top: 20px;
        }
        .menu-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .menu-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #d4af37);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .menu-header p {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .menu-filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0 30px;
        }
        .filter-btn {
            background: rgba(20,18,16,0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(212,175,55,0.3);
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            color: #e8e0d5;
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .filter-btn i {
            font-size: 1rem;
        }
        .filter-btn.active, .filter-btn:hover {
            background: #d4af37;
            color: #0b0a09;
            border-color: #d4af37;
        }
        .menu-section {
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.4s ease-out;
        }
        .menu-section-title {
            font-size: 1.8rem;
            font-family: 'Playfair Display', serif;
            margin-bottom: 1.2rem;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .menu-section-title i {
            font-size: 1.8rem;
            color: #d4af37;
        }
        .menu-section-title:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 50px;
            height: 2px;
            background: #d4af37;
            border-radius: 2px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .menu-card {
            background: rgba(20,18,16,0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.3rem;
            border: 1px solid rgba(212,175,55,0.2);
            transition: all 0.3s;
        }
        .menu-card:hover {
            transform: translateY(-4px);
            border-color: #d4af37;
            background: rgba(30,26,22,0.95);
            box-shadow: 0 15px 25px -10px rgba(212,175,55,0.15);
        }
        .menu-card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
        }
        .menu-card-name {
            font-size: 1.15rem;
            font-weight: 700;
        }
        .menu-card-price {
            color: #d4af37;
            font-weight: 700;
            font-size: 1rem;
        }
        .menu-card-desc {
            font-size: 0.8rem;
            color: #c0b19e;
            margin-top: 0.4rem;
            line-height: 1.4;
        }
        .empty-message {
            text-align: center;
            padding: 2rem;
            background: rgba(20,18,16,0.5);
            border-radius: 40px;
            margin-top: 1rem;
        }
        @media (max-width: 768px) {
            .menu-header h1 { font-size: 1.8rem; }
            .menu-section-title { font-size: 1.5rem; }
            .filter-btn { padding: 6px 14px; font-size: 0.8rem; }
            .menu-grid { gap: 1rem; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="navbar">
            <div class="logo">Black <span>Oromo</span> Coffee</div>
            <div class="nav-links">
                <a href="/">Головна</a>
                <a href="/menu">Меню</a>
                <a href="/reviews">Відгуки</a>
                <a href="/about">Про нас</a>
                <a href="/contacts">Контакти</a>
                <div id="userWidget"></div>
            </div>
        </div>
    </div>
</header>

<main class="menu-page">
    <div class="container">
        <!-- Заголовок Black Oromo Menu -->
        <div class="menu-header">
            <h1>Black Oromo Menu</h1>
            <p>Оберіть свою категорію та насолоджуйтесь</p>
        </div>

        <!-- Фільтри категорій з іконками -->
        <div class="menu-filters" id="filtersContainer"></div>

        <!-- Контейнер для меню -->
        <div id="menuSections"></div>
    </div>
</main>

<footer>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
            <div class="logo" style="font-size: 1.4rem;">Black <span>Oromo</span> Coffee</div>
            <div class="footer-links">
                <a href="/">Головна</a> &nbsp;|&nbsp;
                <a href="/menu">Меню</a> &nbsp;|&nbsp;
                <a href="/reviews">Відгуки</a> &nbsp;|&nbsp;
                <a href="/about">Про нас</a> &nbsp;|&nbsp;
                <a href="/contacts">Контакти</a>
            </div>
            <div><a href="/admin/login" style="color:#d4af37; font-size:0.8rem;">Вхід для адміна</a></div>
        </div>
        <p style="margin-top: 28px;">© 2026 Black Oromo Coffee</p>
    </div>
</footer>

<script src="/socket.io/socket.io.js"></script>
<script src="/chat-sidebar.js"></script>
<script>
    let allMenuItems = [];
    let activeCategory = 'all';

    // Мапа для іконок категорій (у фільтрах та заголовках)
    const categoryIcons = {
        'Кава': 'fas fa-mug-hot',
        'Кава та напої': 'fas fa-mug-hot',
        'Лимонади та коктейлі': 'fas fa-cocktail',
        'Коктейлі': 'fas fa-cocktail',
        'Мілкшейки, Бабл, Десерти': 'fas fa-ice-cream',
        'Десерти': 'fas fa-cake-candles',
        'Фастфуд': 'fas fa-hamburger',
        'Перекуси': 'fas fa-hamburger',
        'Закуски': 'fas fa-bowl-food',
        'Вода': 'fas fa-bottle-water',
        'Напої': 'fas fa-wine-bottle',
        'Снеки': 'fas fa-cookie-bite',
        'Морозиво': 'fas fa-ice-cream'
    };
    
    // Функція для отримання іконки категорії
    function getCategoryIcon(category) {
        if (categoryIcons[category]) return categoryIcons[category];
        // Якщо не знайдено, спробуємо за ключовими словами
        const lower = category.toLowerCase();
        if (lower.includes('кава')) return 'fas fa-mug-hot';
        if (lower.includes('коктейль') || lower.includes('лимонад')) return 'fas fa-cocktail';
        if (lower.includes('десерт') || lower.includes('тістечк')) return 'fas fa-cake-candles';
        if (lower.includes('бургер') || lower.includes('фаст') || lower.includes('снек')) return 'fas fa-hamburger';
        if (lower.includes('морозиво')) return 'fas fa-ice-cream';
        if (lower.includes('вода') || lower.includes('бутильован') || lower.includes('банка')) return 'fas fa-bottle-water';
        return 'fas fa-utensils'; // за замовчуванням
    }

    async function loadMenuData() {
        try {
            const res = await fetch('/api/menu');
            allMenuItems = await res.json();
            if (allMenuItems.length === 0) {
                document.getElementById('menuSections').innerHTML = `
                    <div class="empty-message">
                        <i class="fas fa-utensils" style="font-size: 2.5rem; opacity: 0.5; margin-bottom: 0.8rem; display: block;"></i>
                        <p>Меню ще не заповнене. Зайдіть в <a href="/admin/login" style="color:#d4af37;">адмін-панель</a> та додайте страви.</p>
                    </div>
                `;
                return;
            }
            initFilters();
            renderMenu();
        } catch(e) {
        document.getElementById('menuSections').innerHTML = '<p class="error">Помилка завантаження меню</p>';
        } finally {
            spinner.style.display = 'none';
        }
    }

    function initFilters() {
        const categories = ['all', ...new Set(allMenuItems.map(i => i.category))];
        const container = document.getElementById('filtersContainer');
        container.innerHTML = categories.map(cat => {
            let icon = '';
            let label = cat === 'all' ? 'Всі' : cat;
            if (cat !== 'all') {
                icon = `<i class="${getCategoryIcon(cat)}"></i>`;
            } else {
                icon = '<i class="fas fa-th-large"></i>';
            }
            return `
                <button class="filter-btn ${cat === activeCategory ? 'active' : ''}" data-category="${cat}">
                    ${icon} ${label}
                </button>
            `;
        }).join('');
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                activeCategory = btn.dataset.category;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderMenu();
            });
        });
    }

    function renderMenu() {
        const container = document.getElementById('menuSections');
        if (!allMenuItems.length) return;
        let filtered = allMenuItems;
        if (activeCategory !== 'all') {
            filtered = allMenuItems.filter(i => i.category === activeCategory);
        }
        const grouped = {};
        filtered.forEach(item => {
            if (!grouped[item.category]) grouped[item.category] = [];
            grouped[item.category].push(item);
        });
        if (activeCategory === 'all') {
            container.innerHTML = Object.entries(grouped).map(([cat, items]) => `
                <div class="menu-section">
                    <div class="menu-section-title">
                        <i class="${getCategoryIcon(cat)}"></i>
                        ${escapeHtml(cat)}
                    </div>
                    <div class="menu-grid">
                        ${items.map(item => `
                            <div class="menu-card">
                                <div class="menu-card-header">
                                    <span class="menu-card-name">${escapeHtml(item.name)}</span>
                                    <span class="menu-card-price">${escapeHtml(item.price)}</span>
                                </div>
                                <div class="menu-card-desc">${escapeHtml(item.description || '')}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = `
                <div class="menu-section">
                    <div class="menu-section-title">
                        <i class="${getCategoryIcon(activeCategory)}"></i>
                        ${escapeHtml(activeCategory)}
                    </div>
                    <div class="menu-grid">
                        ${filtered.map(item => `
                            <div class="menu-card">
                                <div class="menu-card-header">
                                    <span class="menu-card-name">${escapeHtml(item.name)}</span>
                                    <span class="menu-card-price">${escapeHtml(item.price)}</span>
                                </div>
                                <div class="menu-card-desc">${escapeHtml(item.description || '')}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':m==='>'?'&gt;':m);
    }

    async function checkUser() {
        try {
            const res = await fetch('/api/user');
            if (res.ok) {
                const user = await res.json();
                document.getElementById('userWidget').innerHTML = `
                    <div class="user-info">
                        <img src="${user.photo || 'https://ui-avatars.com/api/?background=d4af37&color=0b0a09&name='+encodeURIComponent(user.name)}" class="user-avatar">
                        <span>${user.name}</span>
                        <a href="/logout" class="btn-outline" style="padding:4px 12px;">Вийти</a>
                    </div>
                `;
            } else {
                document.getElementById('userWidget').innerHTML = `<a href="/auth/google" class="btn"><i class="fab fa-google"></i> Увійти через Google</a>`;
            }
        } catch(e) { console.log(e); }
    }
    checkUser();
    loadMenuData();
</script>
<!-- Додати перед </body> -->
<div id="menuLoadingSpinner" style="display: none; text-align: center; padding: 40px;">
    <i class="fas fa-spinner fa-spin fa-2x"></i> Завантаження...
</div>

</body>
</html>
